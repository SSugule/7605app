name: Build and Update APK

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**.md'
      - '.gitignore'

permissions: write-all

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Decode Keystore
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing all files in workspace:"
          ls -la
          if [ -f "debug.keystore.base64" ]; then
            echo "Found debug.keystore.base64! Decoding..."
            cat debug.keystore.base64 | tr -d '\r\n ' | base64 -d > debug.keystore
          else
            echo "WARNING: debug.keystore.base64 was NOT found!"
            echo "Creating a fresh debug keystore on the fly using keytool..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          
          echo "Checking if debug.keystore exists after decode/generation:"
          if [ -f "debug.keystore" ]; then
            echo "SUCCESS: debug.keystore is ready!"
            ls -la debug.keystore
          else
            echo "ERROR: debug.keystore could not be resolved!"
            exit 1
          fi

      - name: Regenerate Gradle Wrapper (Fix corrupt JAR)
        run: |
          gradle wrapper
          chmod +x gradlew

      - name: Auto-increment Version (Semantic Patch)
        run: |
          python3 increment_version.py

      - name: Build and Copy APKs
        run: ./gradlew assembleDebug copyApkToRoot --no-configuration-cache

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-installer-apk
          path: app-installer.apk

      - name: Update APK files in repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app-installer.apk installer/app-installer.apk app/app-installer.apk app/build.gradle.kts increment_version.py
          if [ -f "debug.keystore.base64" ]; then
            git add debug.keystore.base64
          fi
          if ! git diff-index --quiet HEAD --; then
            git commit -m "chore: auto-update compiled app-installer.apk and bump version to v${{ env.NEW_VERSION_NAME }} [skip ci]"
            git push origin HEAD:${{ github.ref }} || echo "Could not push back to branch (might be protected). Skipping push."
          else
            echo "No changes to APK files. Skipping commit."
          fi
          
          # Generate and push a git tag for the new semantic version
          if [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "master" ]; then
            echo "Tagging commit with v${{ env.NEW_VERSION_NAME }}..."
            git tag -f "v${{ env.NEW_VERSION_NAME }}"
            git push -f origin "v${{ env.NEW_VERSION_NAME }}" || echo "Failed to push tag v${{ env.NEW_VERSION_NAME }}"
          fi

      - name: Create Semantic Version Release
        uses: softprops/action-gh-release@v2
        if: github.ref_name == 'main' || github.ref_name == 'master'
        with:
          tag_name: "v${{ env.NEW_VERSION_NAME }}"
          name: "Release v${{ env.NEW_VERSION_NAME }}"
          draft: false
          prerelease: false
          files: app-installer.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        if: github.ref_name == 'main' || github.ref_name == 'master'
        with:
          tag_name: latest
          name: "Latest Build v${{ env.NEW_VERSION_NAME }}"
          draft: false
          prerelease: false
          files: app-installer.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
